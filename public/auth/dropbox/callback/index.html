<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Dropbox Auth Callback</title>
  <style>
    body {
      background: #12121a;
      color: #e8e8f0;
      font-family: sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .loader {
      text-align: center;
    }
    .spinner {
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-left-color: #0061ff;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    h2 { color: #0061ff; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <h2>Autenticazione in corso...</h2>
    <p>Questa finestra si chiuderà automaticamente.</p>
  </div>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');
    const error = urlParams.get('error');
    
    if (window.opener) {
      if (code) {
        window.opener.postMessage({ type: 'DROPBOX_AUTH_CODE', code }, '*');
      } else if (error) {
        window.opener.postMessage({ type: 'DROPBOX_AUTH_ERROR', error }, '*');
      }
      // Piccolo ritardo per assicurarsi che il messaggio sia ricevuto
      setTimeout(() => window.close(), 1000);
    } else {
      document.body.innerHTML = '<div class="loader"><h2>Errore</h2><p>Finestra principale non trovata.</p></div>';
    }
  </script>
</body>
</html>
